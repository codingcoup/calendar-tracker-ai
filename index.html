<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>AI Calendar Tracker</title>
    <style>body { font-family: Arial, sans-serif; margin: 40px; }</style>
</head>
<body>
    <h2>Calendar Tracker v1</h2>
    
    <div id="reminderBox" style="color: #d9534f; font-weight: bold; margin-bottom: 20px;"></div>
    <input type="text" id="eventTitle" placeholder="Event Title">
    <select id="eventCategory">
        <option value="Work">💼 Work</option>
        <option value="Personal">🏠 Personal</option>
        <option value="Fitness">🏋️ Fitness</option>
    </select>
    <input type="date" id="eventDate">
    <button onclick="addEvent()">Add Event</button>
    <button onclick="exportJSON()">Export to JSON</button>
    <ul id="eventList"></ul>
    <script>
        let events = JSON.parse(localStorage.getItem('events')) || [];
        window.onload = function() {
            render();
            checkReminders();
        };

        function checkReminders() {
            const reminderBox = document.getElementById('reminderBox');
            reminderBox.innerHTML = ''; // Clear previous messages

            // Get today's local system date formatted as YYYY-MM-DD
            const today = new Date().toISOString().split('T')[0];

            // Filter events that match today's date
            const todaysEvents = events.filter(e => e.date === today);

            if (todaysEvents.length > 0) {
                reminderBox.innerHTML = `⚠️ REMINDER: You have ${todaysEvents.length} event(s) scheduled for today!`;
            }
        }

        function addEvent() {
            const title = document.getElementById('eventTitle').value;
            const date = document.getElementById('eventDate').value;
            const category = document.getElementById('eventCategory').value; // Capture category

            if (!title || !date) return alert('Please fill out all fields');

            const event = { id: Date.now(), title, date, category };
            events.push(event);
            localStorage.setItem('events', JSON.stringify(events));
            render();
        }

        function deleteEvent(id) {
            events = events.filter(e => e.id !== id);
            localStorage.setItem('events', JSON.stringify(events));
            render();
        }

        function render() {
            const list = document.getElementById('eventList');
            list.innerHTML = '';
            events.forEach(e => {
                // Display the category badge alongside the date and title
                list.innerHTML += `<li>[${e.category}] ${e.date} - ${e.title} <button onclick="deleteEvent(${e.id})">Delete</button></li>`;
            });
        }
        function exportJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(events));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "calendar_events.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }
    </script>
</body>
</html>
